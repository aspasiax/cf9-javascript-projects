<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Search | CF9 Portfolio</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script type="module" src="./js/index.js"></script>
</head>
<body class="bg-[#b02e2e] m-0 font-sans">

  <div id="center" class="text-center py-10">
    <div class="mb-5">
        <h1 class="text-white text-4xl font-serif">Movie Search</h1>
    </div>
    <div class="mb-8 flex justify-center items-center gap-3">
        <div class="relative">
            <input id="searchInput" type="text" 
                   class="w-80 h-14 pl-12 pr-4 rounded-full border-2 border-black focus:outline-none placeholder:text-slate-500 shadow-lg" 
                   placeholder="Enter a movie title..." autofocus/>
            <div class="absolute left-4 top-4">🔍</div>
        </div>
        <img id="waiting" class="hidden w-10 h-10" src="./img/waiting.gif" alt="loading">
    </div>
    
    <div id="movie" class="hidden inline-flex flex-wrap justify-center gap-8 px-4">
        <div class="w-72 shadow-2xl">
            <img id="image" class="rounded-lg w-full" alt='Poster not available'>
        </div>
        <div class="max-w-[600px] text-left">
            <div class="basic">
                <div class="mb-4">
                    <a id="favoriteLink" href="#">
                        <img id="favoriteImg" alt="favorite" src="./img/favorite.png" width="30">
                    </a>     
                </div>
                <h2 id="title" class="text-white text-4xl font-bold mb-2">Movie Title</h2>
                <div class="flex gap-4 text-white/80 font-mono mb-4">
                    <span id="year">Year</span>
                    <span id="runtime">Runtime</span>
                    <span id="genre">Genre</span>
                </div>
                <div class="flex items-center gap-2 mb-4">
                    <a id="imdbId" target="_blank"><img id="imdb" src="./img/imdb.png" alt="IMDb"></a>
                    <span class="text-white font-bold text-xl"><span id="imdbRating"></span>/10</span>
                </div>
                <p id="plot" class="text-white leading-relaxed mb-6">Plot description goes here...</p>
            </div>
            
            <div class="extended hidden space-y-2 mb-6 p-4 bg-black/20 rounded-lg text-white font-mono text-sm">
                <div id="director"><b>Director: </b><span></span></div>
                <div id="actors"><b>Actors: </b><span></span></div>
                <div id="production"><b>Production: </b><span></span></div>
                <div id="boxOffice"><b>Box Office: </b><span></span></div>
                <div id="language"><b>Language: </b><span></span></div>
                <div id="rated"><b>Rated: </b><span></span></div>
            </div>

            <div class="flex justify-start">
                <a id="showMore" class="flex items-center gap-2 border-2 border-white text-white px-6 py-2 rounded-md hover:bg-white hover:text-[#b02e2e] transition-all font-bold" href="#">
                    MORE DETAILS
                    <img class="w-5 h-5" src="./img/clacket.png" alt="">
                </a>
            </div>
        </div>
    </div>
</div>

<div id="notFound" class="hidden text-center mt-10">
    <span class="text-white text-xl bg-black/30 px-6 py-3 rounded">No movies found matching your search.</span>
</div>
<div id="error" class="hidden text-center mt-10">
    <span class="text-white text-xl bg-red-900/50 px-6 py-3 rounded">An error occurred while fetching data.</span>
</div>
  
</body>
</html>
