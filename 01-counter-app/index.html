<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App | CF9 Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <main>
        <div class="root d-flex flex-column justify-content-center align-items-center">

            <div class="text-center">
                <div class="mb-2">
                    <span class="display-2 fw-bold">Counter</span>
                </div> 

                <div class="border border-dark rounded-pill p-3" style="min-width: 200px;">
                    <span id="counter" class="display-2" aria-live="polite"></span>
                </div>
            </div>

            <div class="mt-4">
                <button id="btnDecr" class="btn btn-lg btn-outline-danger me-2">Decrease</button>
                <button id="btnReset" class="btn btn-lg btn-outline-secondary me-2">Reset</button>
                <button id="btnIncr" class="btn btn-lg btn-outline-success">Increase</button>
            </div>
        </div>
    </main>

    <script src="./main.js"></script>
</body>
</html>
